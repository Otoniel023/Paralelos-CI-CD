name: CI/CD Paralelos API

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: paralelos-cicd
  REGION: us-central1
  SERVICE: paralelos-api-service
  IMAGE: us-central1-docker.pkg.dev/paralelos-cicd/docker-repo/paralelos-api

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build y Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build y Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test --if-present

  # ─────────────────────────────────────────────
  # Job 2: Docker Build y Push
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build y Push
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Crear Artifact Registry si no existe
        run: |
          gcloud artifacts repositories describe docker-repo \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create docker-repo \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker repo Paralelos API"

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build imagen Docker
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push imagen Docker
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ─────────────────────────────────────────────
  # Job 3: Terraform Plan y Apply
  # ─────────────────────────────────────────────
  terraform:
    name: Terraform Plan y Apply
    runs-on: ubuntu-latest
    needs: docker-build-push
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="cloud_run_image=${{ env.IMAGE }}:${{ github.sha }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="db_user=${{ secrets.DB_USER }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Obtener outputs
        run: |
          echo "Cloud Run URL: $(terraform output -raw cloud_run_url)"
          echo "API Gateway URL: $(terraform output -raw api_gateway_url 2>/dev/null || echo 'pendiente')"

  # ─────────────────────────────────────────────
  # Job 4: Deploy Cloud Run
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy Cloud Run
    runs-on: ubuntu-latest
    needs: terraform
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=5 \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars="DB_USER=${{ secrets.DB_USER }}" \
            --set-secrets="DB_PASSWORD=paralelos-db-password:latest" \
            --set-secrets="JWT_SECRET=paralelos-jwt-secret:latest"

      - name: Obtener URL y verificar
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "================================================"
          echo "  Build             OK"
          echo "  Test              OK"
          echo "  Docker Build      OK"
          echo "  Artifact Registry OK"
          echo "  Terraform Plan    OK"
          echo "  Terraform Apply   OK"
          echo "  Deploy Cloud Run  OK"
          echo "================================================"
          echo "  URL: $URL"
          echo "  Usar esta URL en la app Flutter"
          echo "================================================"
