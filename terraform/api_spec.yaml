swagger: "2.0"
info:
  title: Paralelos API Gateway
  description: API Gateway para Paralelos - Sistema de Calzado
  version: "1.0.0"
host: "paralelos-api-gateway.apigateway.paralelos-cicd.cloud.goog"
schemes:
  - https
produces:
  - application/json

x-google-backend:
  address: ${cloud_run_url}
  protocol: h2

securityDefinitions:
  api_key:
    type: apiKey
    name: x-api-key
    in: header

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK

  /api/usuarios/login:
    post:
      summary: Login
      operationId: login
      parameters:
        - in: body
          name: body
          schema:
            type: object
      responses:
        "200":
          description: Login exitoso

  /api/usuarios/register:
    post:
      summary: Registro
      operationId: register
      parameters:
        - in: body
          name: body
          schema:
            type: object
      responses:
        "201":
          description: Usuario creado

  /api/usuarios:
    get:
      summary: Listar usuarios
      operationId: getUsers
      security:
        - api_key: []
      responses:
        "200":
          description: Lista de usuarios
    post:
      summary: Crear usuario
      operationId: createUser
      security:
        - api_key: []
      parameters:
        - in: body
          name: body
          schema:
            type: object
      responses:
        "201":
          description: Usuario creado

  /api/usuarios/{id}:
    get:
      summary: Obtener usuario
      operationId: getUserById
      security:
        - api_key: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses:
        "200":
          description: Usuario encontrado
    put:
      summary: Actualizar usuario
      operationId: updateUser
      security:
        - api_key: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
        - in: body
          name: body
          schema:
            type: object
      responses:
        "200":
          description: Usuario actualizado
    delete:
      summary: Eliminar usuario
      operationId: deleteUser
      security:
        - api_key: []
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses:
        "204":
          description: Usuario eliminado

  /api/upload:
    post:
      summary: Upload archivo
      operationId: uploadFile
      security:
        - api_key: []
      parameters:
        - in: body
          name: body
          schema:
            type: object
      responses:
        "200":
          description: Archivo subido